name: Generate Snake

on:
  push:
  workflow_dispatch:
  schedule:
  - cron: "0 0 * * *"
  
permissions:
  contents: write
  

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Generate snake
        uses: Platane/snk@v3
        with:
          github_user_name: Sandhyae2
          outputs: dist/github-contribution-grid-snake.svg

      - uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: output
          folder: dist
          clean: true
          force: true

